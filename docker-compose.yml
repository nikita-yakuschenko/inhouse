# Приложение Smartcut. Postgres — отдельный сервис в Dokploy, не здесь.
# В Dokploy / .env задайте DATABASE_URL на вашу БД, например:
# postgresql://cutting:SECRET@smartcut-postgres:5432/cutting

name: smartcut-inhouse

services:
  app:
    build: .
    container_name: cutting-app
    restart: unless-stopped
    ports:
      - "3300:3000"
    environment:
      DATABASE_URL: ${DATABASE_URL}
    # Без локальной БД в этом compose приложение не стартует,
    # пока DATABASE_URL не указывает на доступный Postgres.
